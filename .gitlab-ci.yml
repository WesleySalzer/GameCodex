# GitLab CI/CD — optimized for compute minutes
# Primary test on Node 22 every push, Node 18 compat weekly via scheduled pipeline.
# Lint/audit removed (were no-ops). Pages deploy on main for site changes only.

workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - packages/**/*
        - package.json
        - package-lock.json
        - .gitlab-ci.yml

stages:
  - test
  - deploy

default:
  interruptible: true

# ── Primary test (Node 22, every relevant push) ──
test:
  stage: test
  image: node:22
  cache:
    key: npm-v1
    paths:
      - node_modules/
      - packages/server/node_modules/
      - packages/site/node_modules/
  script:
    - npm ci
    - npm run build
    - test -f packages/server/dist/index.js
    - npm run typecheck
    - npm test
    - npm pack --dry-run --workspace=gamecodex
  rules:
    - changes:
        - packages/server/**/*
        - package.json
        - package-lock.json

# ── Min-supported Node compat (scheduled only) ──
test:node-18:
  stage: test
  image: node:18
  cache:
    key: npm-node18
    paths:
      - node_modules/
  script:
    - npm ci
    - npm run build
    - npm run typecheck
    - npm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "schedule"

# ── Deploy site to GitLab Pages (main, site changes only) ──
pages:
  stage: deploy
  image: node:22
  cache:
    key: npm-v1
    paths:
      - node_modules/
      - packages/site/node_modules/
    policy: pull
  script:
    - npm ci
    - npm run build:site
    - mv packages/site/out public
  artifacts:
    paths:
      - public
  rules:
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
      changes:
        - packages/site/**/*
